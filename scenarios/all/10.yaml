services:
  rabbitmq:
    build:
      context: ./src/rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    environment:
      - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
      - 5672:5672
      - 15672:15672

  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./persisted_state:/app/state
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
      - MOM_HOST=rabbitmq
      - TRANSACTIONS_USD_EXCHANGE=transactions_usd_exchange
      - TRANSACTIONS_DATE_EXCHANGE=transactions_date_exchange
      - ACCOUNTS_EXCHANGE=merge_max_by_account_exchange
      - RESULT_EXCHANGE=gateway_results_exchange
      - SERVER_PORT=5678
      - TRANSACTIONS_USD_WORKERS=3
      - TRANSACTIONS_DATE_WORKERS=3
      - ACCOUNTS_WORKERS=3
      - EXPECTED_RESULTS=5
      - FD_NODE_ID=1
      - FD_NODES=1:gateway,2:q1_join,3:q2_join,4:q3_averages_join,5:q3_result_join,6:q4_join_0,7:q5_join

  filtro_usd_1:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filtro_usd_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./src/filter/config/usd_fanout_config.yaml:/app/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WORKER_ID=1
      - EOF_EXPECTED=1
      - NUM_DOWNSTREAM_WORKERS=3
      - STAGE_NAME=filtro_usd
      - FD_NODES=1:filtro_usd_1,2:filtro_usd_2,3:filtro_usd_3
      - FD_NODE_ID=1

  filtro_usd_2:
    build:
