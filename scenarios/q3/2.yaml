services:
  rabbitmq:
    build:
      context: .
      dockerfile: src/rabbitmq/Dockerfile
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672

  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - TRANSACTIONS_QUEUE=transactions_queue
    - ACCOUNTS_QUEUE=accounts_queue
    - INPUT_QUEUE=result_queue
    - SERVER_PORT=5678

  # ── Filtro USD: 3 réplicas ─────────────────────────────────────────────────
  # Compiten por mensajes en transactions_queue (round-robin RabbitMQ).
  # El EOF llega a exactamente 1 réplica → propaga 1 EOF a q3_queue.
  filter_usd_0:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filter_usd_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/q3_usd_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  filter_usd_1:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filter_usd_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/q3_usd_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  filter_usd_2:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filter_usd_2
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/q3_usd_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  # ── Filtro fecha: 3 réplicas ───────────────────────────────────────────────
  filter_date_0:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filter_date_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/date_multiplex_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  filter_date_1:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filter_date_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/date_multiplex_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  filter_date_2:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filter_date_2
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/date_multiplex_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  # ── Group: 3 réplicas × 3 shards = 9 workers ─────────────────────────────
  # Cada shard tiene 3 réplicas compitiendo en la misma cola de entrada.
  # Cuando llega el EOF upstream (1 por shard), UNA réplica lo recibe y
  # hace broadcast al fanout compartido. Las 3 réplicas del shard reciben
  # ese broadcast → las 3 flushean → cada aggregator recibe 9 EOFs
  # (3 shards × 3 réplicas = 9 flushes, cada flush envía a los 3 aggregators).
  group_q3_shard0_0:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_q3_shard0_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q3_shard_0_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  group_q3_shard0_1:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_q3_shard0_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q3_shard_0_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  group_q3_shard0_2:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_q3_shard0_2
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q3_shard_0_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  group_q3_shard1_0:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_q3_shard1_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q3_shard_1_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  group_q3_shard1_1:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_q3_shard1_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q3_shard_1_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  group_q3_shard1_2:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_q3_shard1_2
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q3_shard_1_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  group_q3_shard2_0:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_q3_shard2_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q3_shard_2_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  group_q3_shard2_1:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_q3_shard2_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q3_shard_2_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  group_q3_shard2_2:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_q3_shard2_2
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q3_shard_2_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  # ── Aggregators: 1 por shard, expected_eofs=9 ─────────────────────────────
  # Con 3 group_replicas × 3 shards cada aggregator recibe 9 EOFs.
  agg_q3_0:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: agg_q3_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/q3_shard_0_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - EXPECTED_EOFS=9

  agg_q3_1:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: agg_q3_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/q3_shard_1_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - EXPECTED_EOFS=9

  agg_q3_2:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: agg_q3_2
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/q3_shard_2_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - EXPECTED_EOFS=9

  # ── Join: 1 instancia, expected_eofs=3 (no escala) ────────────────────────
  join_q3_0:
    build:
      context: .
      dockerfile: src/join/Dockerfile
    container_name: join_q3_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/join/config/q3_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  # ── Filtro promedio histórico: 1 instancia ─────────────────────────────────
  filter_hist_avg_q3_0:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filter_hist_avg_q3_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/q3_historical_avg_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  # ── 3 clientes simultáneos ────────────────────────────────────────────────
  client_0:
    build:
      context: .
      dockerfile: src/client/Dockerfile
    container_name: client_0
    depends_on:
    - gateway
    volumes:
    - ./data/LI-Small_Trans.csv:/data/transactions.csv:ro
    - ./data/LI-Small_accounts.csv:/data/accounts.csv:ro
    environment:
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - TRANSACTIONS_DATASET_PATH=/data/transactions.csv
    - ACCOUNTS_DATASET_PATH=/data/accounts.csv
    - BATCH_SIZE=500

  client_1:
    build:
      context: .
      dockerfile: src/client/Dockerfile
    container_name: client_1
    depends_on:
    - gateway
    volumes:
    - ./data/LI-Small_Trans.csv:/data/transactions.csv:ro
    - ./data/LI-Small_accounts.csv:/data/accounts.csv:ro
    environment:
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - TRANSACTIONS_DATASET_PATH=/data/transactions.csv
    - ACCOUNTS_DATASET_PATH=/data/accounts.csv
    - BATCH_SIZE=500

  client_2:
    build:
      context: .
      dockerfile: src/client/Dockerfile
    container_name: client_2
    depends_on:
    - gateway
    volumes:
    - ./data/LI-Small_Trans.csv:/data/transactions.csv:ro
    - ./data/LI-Small_accounts.csv:/data/accounts.csv:ro
    environment:
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - TRANSACTIONS_DATASET_PATH=/data/transactions.csv
    - ACCOUNTS_DATASET_PATH=/data/accounts.csv
    - BATCH_SIZE=500
