services:
  rabbitmq:
    build:
      context: ./src/rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672

  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - TRANSACTIONS_USD_EXCHANGE=transactions_exchange
    - TRANSACTIONS_DATE_EXCHANGE=transactions_unused_exchange
    - ACCOUNTS_QUEUE=accounts_queue
    - RESULT_EXCHANGE=gateway_results_exchange
    - SERVER_PORT=5678

  q3_filter_usd_0:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: q3_filter_usd_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/q3_usd_config.yaml:/app/config.yaml:ro
    environment:
    - EOF_EXPECTED=1            # gateway = 1 publisher
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=1  # 1 router downstream
    - ROUTING_STRATEGY=round_robin

  q3_date_router_0:
    build:
      context: .
      dockerfile: src/transaction_router/Dockerfile
    container_name: q3_date_router_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/transaction_router/config/q3_dates.yaml:/app/config.yaml:ro
    environment:
    - EOF_EXPECTED=1            # 1 filtro USD upstream
    - WORKER_ID=1

  q3_group_0:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: q3_group_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q3_payment_avg.yaml:/app/config.yaml:ro
    environment:
    - EOF_EXPECTED=1            # 1 router upstream (rama historica)
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=1  # 1 aggregator shard
    - ROUTING_STRATEGY=sharded  # shardea por payment_format

  q3_aggregator_0:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: q3_aggregator_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/q3_payment_avg.yaml:/app/config.yaml:ro
    environment:
    - EOF_EXPECTED=1            # 1 group upstream
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=1  # 1 join broadcast
    - ROUTING_STRATEGY=round_robin

  q3_averages_join_0:
    build:
      context: .
      dockerfile: src/join/Dockerfile
    container_name: q3_averages_join_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/join/config/q3_averages_broadcast_config.yaml:/app/config.yaml:ro
    environment:
    - EOF_EXPECTED=1            # 1 aggregator shard upstream
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=1
    - ROUTING_STRATEGY=broadcast  # fanout de promedios a todos los historical_filter

  q3_historical_filter_0:
    build:
      context: .
      dockerfile: src/historical_filter/Dockerfile
    container_name: q3_historical_filter_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/historical_filter/config/q3.yaml:/app/config.yaml:ro
    environment:
    - EOF_EXPECTED=2            # 1 router (candidatas) + 1 join (promedios)
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=1  # 1 join final

  q3_result_join_0:
    build:
      context: .
      dockerfile: src/join/Dockerfile
    container_name: q3_result_join_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/join/config/q3_result_config.yaml:/app/config.yaml:ro
    environment:
    - EOF_EXPECTED=1            # 1 historical_filter upstream
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=1
    - QUERY_RESULT_NUMBER=3

  client_0:
    build:
      context: .
      dockerfile: src/client/Dockerfile
    container_name: client_0
    depends_on:
    - gateway
    volumes:
    - ./data/small_trans.csv:/data/small_trans.csv
    - ./data/small_accounts.csv:/data/small_accounts.csv
    - ./results/clients/client_0:/results/clients/client_0
    environment:
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - OUTPUT_PATH=/results/clients/client_0/
    - ACCOUNTS_PATH=/data/small_accounts.csv
    - TRANSACTIONS_PATH=/data/small_trans.csv
    - BATCH_SIZE=500
