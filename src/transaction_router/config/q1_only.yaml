# TODO: Si se agregan replicas del router, hay que actualizar a mano
# EOF_EXPECTED en cada worker downstream (en el scenario compose) para
# que coincida con la cantidad de replicas. Si no, los downstream flushean
# estado parcial y producen resultados incorrectos silenciosos.
#
# TODO: El gateway hoy publica el mismo batch a TRANSACTIONS_USD_EXCHANGE
# y a TRANSACTIONS_DATE_EXCHANGE (hardcodeado en src/gateway/main.py:171-179).
# Mientras eso siga asi, el scenario que use este router debe apuntar
# TRANSACTIONS_DATE_EXCHANGE a un exchange sin consumers para evitar
# duplicados.
#
# TODO: Soportar routing_strategy=sharded cuando entren Q3/Q4.

mom_host: rabbitmq

input: transactions_exchange

routes:
  - name: q1
    output: q1_input_exchange
    num_downstream_workers: 1
    routing_strategy: round_robin
    filters:
      - type: currency
        value: US Dollar
