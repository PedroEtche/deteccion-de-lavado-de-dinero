services:
  rabbitmq:
    build:
      context: ./src/rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672

  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - TRANSACTIONS_QUEUE=transactions_queue
    - ACCOUNTS_QUEUE=accounts_queue
    - INPUT_QUEUE=result_queue
    - SERVER_PORT=5678

  # Stage 1: keep only transactions in [2022-09-01, 2022-09-05]
  filter_q5_date_0:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filter_q5_date_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/q5_date_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=transactions_queue
    - OUTPUT_QUEUE=q5_wire_ach_queue

  # Stage 2: keep only Wire and ACH transactions
  filter_q5_wire_ach_0:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filter_q5_wire_ach_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/q5_wire_ach_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=q5_wire_ach_queue
    - OUTPUT_QUEUE=q5_convert_queue

  # Stage 3: convert amount_paid to USD (drops Bitcoin)
  q5_currency_converter_0:
    build:
      context: .
      dockerfile: src/currency_converter/Dockerfile
    container_name: q5_currency_converter_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=q5_convert_queue
    - OUTPUT_QUEUE=q5_amount_queue

  # Stage 4: keep only transactions where converted amount < 1 USD
  filter_q5_amount_lt1_0:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filter_q5_amount_lt1_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/q5_amount_lt1_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=q5_amount_queue
    - OUTPUT_QUEUE=q5_count_queue

  # Stage 5: count qualifying transactions per client
  q5_count_aggregator_0:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: q5_count_aggregator_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/q5_count_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=q5_count_queue
    - OUTPUT_QUEUE=result_queue
    - STRATEGY=Count
    - EOF_FANOUT=q5_count_eof
    - EXPECTED_EOFS=1

  client_0:
    build:
      context: .
      dockerfile: src/client/Dockerfile
    container_name: client_0
    depends_on:
    - gateway
    volumes:
    - ./data/sample_q5.csv:/data/transactions.csv:ro
    - ./data/accounts_sample.csv:/data/accounts.csv:ro
    environment:
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - TRANSACTIONS_DATASET_PATH=/data/transactions.csv
    - ACCOUNTS_DATASET_PATH=/data/accounts.csv
    - BATCH_SIZE=${BATCH_SIZE:-500}
