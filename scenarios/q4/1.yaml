    environment:
    - EOF_EXPECTED=1
    - WORKER_ID=2
    - NUM_DOWNSTREAM_WORKERS=1
    - STAGE_NAME=aggregator_accounts

  q4_join_0:  
    build:
      context: .
      dockerfile: src/join/Dockerfile
    container_name: q4_join_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/join/config/q4_result.yaml:/app/config.yaml:ro
    - ./persisted_state:/app/state
    environment:
    - EOF_EXPECTED=2
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=1
    - QUERY_RESULT_NUMBER=4
    - STAGE_NAME=join_query_result

  client_0:
    build:
      context: .
      dockerfile: src/client/Dockerfile
    command: ["sh", "-c", "sleep 10 && python -m src.client.main"]
    container_name: client_0
    depends_on:
    - gateway
    volumes:
    - ./data/small_trans.csv:/data/small_trans.csv
    - ./data/small_accounts.csv:/data/small_accounts.csv
    - ./results/clients/client_0:/results/clients/client_0
    environment:
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - OUTPUT_PATH=/results/clients/client_0/
    - ACCOUNTS_PATH=/data/small_accounts.csv
    - TRANSACTIONS_PATH=/data/small_trans.csv
    - BATCH_SIZE=500
