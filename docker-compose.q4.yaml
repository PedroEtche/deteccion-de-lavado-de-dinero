services:
  rabbitmq:
    build:
      context: ./src/rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672

  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - TRANSACTIONS_QUEUE=transactions_queue
    - ACCOUNTS_QUEUE=accounts_queue
    - INPUT_QUEUE=result_queue
    - SERVER_PORT=5678

  # Stage 1: keep only USD transactions
  q4_filter_usd_0:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: q4_filter_usd_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/usd_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - EOF_FANOUT=q4_filter_by_usd_eof
    - EXPECTED_EOFS=1

  # Stage 2: keep only [2022-09-01, 2022-09-06] (matches notebook patrón)
  q4_filter_by_datetime_0:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: q4_filter_by_datetime_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/q4_date_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - EOF_FANOUT=q4_filter_by_datetime_eof
    - EXPECTED_EOFS=1

  # Stage 3: route by From-To so the SelfMerge is shard-local
  q4_selfmerge_route_group_0:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: q4_selfmerge_route_group_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q4_selfmerge_route.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - EOF_FANOUT=q4_selfmerge_route_eof
    - EXPECTED_EOFS=1

  # Stage 4: detect chains A→B→C (per client, with A != C). 4 shards by
  # intermediary account — SelfMerge emits a chain only from the shard that
  # owns its B to avoid double counting (the MergeRouting ships each tx to 2
  # shards, so chains can be visible in shard(B) and shard(A)=shard(C) too).
  q4_merge_with_self_0:
    build:
      context: .
      dockerfile: src/joiner/Dockerfile
    container_name: q4_merge_with_self_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/joiner/config/q4_merge_with_self.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - SHARD_ID=0
    - SHARD_AMOUNT=4
    - EOF_FANOUT=q4_selfmerge_eof_0
    - EXPECTED_EOFS=1

  q4_merge_with_self_1:
    build:
      context: .
      dockerfile: src/joiner/Dockerfile
    container_name: q4_merge_with_self_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/joiner/config/q4_merge_with_self.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - SHARD_ID=1
    - SHARD_AMOUNT=4
    - EOF_FANOUT=q4_selfmerge_eof_1
    - EXPECTED_EOFS=1

  q4_merge_with_self_2:
    build:
      context: .
      dockerfile: src/joiner/Dockerfile
    container_name: q4_merge_with_self_2
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/joiner/config/q4_merge_with_self.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - SHARD_ID=2
    - SHARD_AMOUNT=4
    - EOF_FANOUT=q4_selfmerge_eof_2
    - EXPECTED_EOFS=1

  q4_merge_with_self_3:
    build:
      context: .
      dockerfile: src/joiner/Dockerfile
    container_name: q4_merge_with_self_3
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/joiner/config/q4_merge_with_self.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - SHARD_ID=3
    - SHARD_AMOUNT=4
    - EOF_FANOUT=q4_selfmerge_eof_3
    - EXPECTED_EOFS=1

  # Stage 5: group by (origin, destination), shard x4. Receives 4 EOFs from
  # the 4 SelfMerge replicas upstream.
  q4_group_by_orig_dest_0:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: q4_group_by_orig_dest_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q4_group_by_orig_dest.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - EOF_FANOUT=q4_group_by_orig_dest_eof
    - EXPECTED_EOFS=4

  # Stage 6: aggregate pair counts globally — 4 shards, one per shard route.
  # Each consumes from its own queue groupby_orig_dest_route_X (env override).
  q4_aggregator_count_pairs_0:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: q4_aggregator_count_pairs_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/q4_aggregator_count_pairs.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - SHARD_ID=0
    - INPUT_QUEUE=groupby_orig_dest_route_0
    - EOF_FANOUT=q4_aggregator_count_pairs_eof_0
    - EXPECTED_EOFS=1

  q4_aggregator_count_pairs_1:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: q4_aggregator_count_pairs_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/q4_aggregator_count_pairs.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - SHARD_ID=1
    - INPUT_QUEUE=groupby_orig_dest_route_1
    - EOF_FANOUT=q4_aggregator_count_pairs_eof_1
    - EXPECTED_EOFS=1

  q4_aggregator_count_pairs_2:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: q4_aggregator_count_pairs_2
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/q4_aggregator_count_pairs.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - SHARD_ID=2
    - INPUT_QUEUE=groupby_orig_dest_route_2
    - EOF_FANOUT=q4_aggregator_count_pairs_eof_2
    - EXPECTED_EOFS=1

  q4_aggregator_count_pairs_3:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: q4_aggregator_count_pairs_3
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/q4_aggregator_count_pairs.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - SHARD_ID=3
    - INPUT_QUEUE=groupby_orig_dest_route_3
    - EOF_FANOUT=q4_aggregator_count_pairs_eof_3
    - EXPECTED_EOFS=1

  # Stage 7: filter pairs with count > 5 (notebook: size > 5)
  q4_filter_by_count_0:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: q4_filter_by_count_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/q4_count_more_than_5.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - EOF_FANOUT=q4_filter_by_count_eof
    - EXPECTED_EOFS=1

  # Stage 8: split pair into the two accounts (FlatMap), shard by (bank, account).
  # The filter_by_count forwards 4 EOFs (one per upstream aggregator shard).
  q4_group_by_account_0:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: q4_group_by_account_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q4_group_by_account.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - EOF_FANOUT=q4_group_by_account_eof
    - EXPECTED_EOFS=4

  # Stage 9: dedupe accounts globally → emit unique list
  q4_aggregator_accounts_0:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: q4_aggregator_accounts_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/q4_aggregator_accounts.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - SHARD_ID=0
    - EOF_FANOUT=q4_aggregator_accounts_eof
    - EXPECTED_EOFS=1

  client_0:
    build:
      context: .
      dockerfile: src/client/Dockerfile
    depends_on:
    - gateway
    volumes:
    - ./data/sample_q4.csv:/data/transactions.csv:ro
    - ./data/accounts_sample.csv:/data/accounts.csv:ro
    environment:
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - TRANSACTIONS_DATASET_PATH=/data/transactions.csv
    - ACCOUNTS_DATASET_PATH=/data/accounts.csv
    - BATCH_SIZE=${BATCH_SIZE:-500}
