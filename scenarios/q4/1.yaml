    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=result_queue
    - OUTPUT_QUEUE=result_queue

  client_0:
    build:
      context: .
      dockerfile: src/client/Dockerfile
    container_name: client_0
    depends_on:
    - gateway
    volumes:
    - ./data/LI-Small_Trans.csv:/data/dataset.csv:ro
    environment:
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - DATASET_PATH=/data/dataset.csv
    - BATCH_SIZE=500
