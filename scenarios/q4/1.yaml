  q4_group_by_orig_dest_0:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: q4_group_by_orig_dest
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=result_queue
    - OUTPUT_QUEUE=result_queue

  q4_filter_by_count_0:
    build:
