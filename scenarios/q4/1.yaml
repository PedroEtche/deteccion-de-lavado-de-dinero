services:
  rabbitmq:
    build:
      context: ./src/rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672

  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - TRANSACTIONS_EXCHANGE=transactions_exchange
    - ACCOUNTS_QUEUE=accounts_queue
    - RESULT_EXCHANGE=gateway_results_exchange
    - SERVER_PORT=5678
    - TRANSACTIONS_USD_WORKERS=2
    - TRANSACTIONS_DATE_WORKERS=1
    - ACCOUNTS_WORKERS=1

  filter_usd_0:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filter_usd_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/usd_config.yaml:/app/config.yaml:ro
    environment:
    - EOF_EXPECTED=1
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=3
    - STAGE_NAME=filter_usd

  filter_usd_1:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filter_usd_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/usd_config.yaml:/app/config.yaml:ro
    - ./persisted_state:/app/state
    environment:
    - EOF_EXPECTED=1
    - WORKER_ID=2
    - NUM_DOWNSTREAM_WORKERS=3
    - STAGE_NAME=filter_usd

  q3_date_router_0:
    build:
      context: .
      dockerfile: src/transaction_router/Dockerfile
    container_name: q3_date_router_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/transaction_router/config/q4_dates.yaml:/app/config.yaml:ro
    environment:
    - EOF_EXPECTED=2       # 1 filtro USD upstream
    - WORKER_ID=1
    - STAGE_NAME=date_router

  group_scatter_0:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_scatter_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q4_scatter_group.yaml:/app/config.yaml:ro
    - ./persisted_state:/app/state
    environment:
    - EOF_EXPECTED=1
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=2
    - ROUTING_STRATEGY=sharded
    - STAGE_NAME=group_scatter

  group_scatter_1:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_scatter_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q4_scatter_group.yaml:/app/config.yaml:ro
    - ./persisted_state:/app/state
    environment:
    - EOF_EXPECTED=1
    - WORKER_ID=2
    - NUM_DOWNSTREAM_WORKERS=2
    - ROUTING_STRATEGY=sharded
    - STAGE_NAME=group_scatter

  group_scatter_2:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_scatter_2
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q4_scatter_group.yaml:/app/config.yaml:ro
    - ./persisted_state:/app/state
    environment:
    - EOF_EXPECTED=1
    - WORKER_ID=3
    - NUM_DOWNSTREAM_WORKERS=2
    - ROUTING_STRATEGY=sharded
    - STAGE_NAME=group_scatter

  aggregator_scatter_group_0:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: aggregator_scatter_group_0 
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/q4_scatter_aggregator.yaml:/app/config.yaml:ro
    - ./persisted_state:/app/state
    environment:
    - EOF_EXPECTED=3
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=2
    - ROUTING_STRATEGY=sharded
    - STAGE_NAME=scatter_aggregator

  aggregator_scatter_group_1:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: aggregator_scatter_group_1 
    depends_on:
