services:
  node1:
    build: .
    container_name: hb_node1
    command: ["python", "-u", "test.py"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ID=node1
      - PEERS=node1,node2,node3
      - CONTAINER_NAME=hb_node1
      - PEER_CONTAINERS=node2:hb_node2,node3:hb_node3

  node2:
    build: .
    container_name: hb_node2
    command: ["python", "-u", "test.py"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ID=node2
      - PEERS=node1,node2,node3
      - CONTAINER_NAME=hb_node2
      - PEER_CONTAINERS=node1:hb_node1,node3:hb_node3

  node3:
    build: .
    container_name: hb_node3
    command: ["python", "-u", "test.py"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ID=node3
      - PEERS=node1,node2,node3
      - CONTAINER_NAME=hb_node3
      - PEER_CONTAINERS=node1:hb_node1,node2:hb_node2
