services:
  rabbitmq:
    build:
      context: ./src/rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672

  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - TRANSACTIONS_EXCHANGE=transactions_exchange
    - ACCOUNTS_QUEUE=accounts_queue
    - RESULT_EXCHANGE=gateway_results_exchange
    - SERVER_PORT=5678
    - TRANSACTIONS_USD_WORKERS=2
    - TRANSACTIONS_DATE_WORKERS=1
    - ACCOUNTS_WORKERS=1

  filter_usd_0:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filter_usd_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/usd_config.yaml:/app/config.yaml:ro
    environment:
    - EOF_EXPECTED=1
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=1
    - WORKER_NAME=filter_usd
    - STAGE_NAME=filter_usd

  group_by_bank_max_0:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_by_bank_max_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/bank_max_amount.yaml:/app/config.yaml:ro
    environment:
    - EOF_EXPECTED=1
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=1
    - STAGE_NAME=group_by_bank_max

  aggregator_bank_max_amount_0:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: aggregator_bank_max_amount_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/max_amount_per_bank_config.yaml:/app/config.yaml:ro
    environment:
    - EOF_EXPECTED=1
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=1
    - STAGE_NAME=aggregator_bank_max_amount

  merge_account_info_0:
    build:
      context: .
      dockerfile: src/merge/Dockerfile
    container_name: merge_account_info_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/merge/config/accounts_config.yaml:/app/config.yaml:ro
    environment:
    - EOF_EXPECTED=2
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=1
    - STAGE_NAME=merge_account_info

  join_query_result_0:
    build:
      context: .
      dockerfile: src/join/Dockerfile
    container_name: join_query_result_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/join/config/q2_result.yaml:/app/config.yaml:ro
    environment:
    - EOF_EXPECTED=1
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=1
    - QUERY_RESULT_NUMBER=2
    - STAGE_NAME=join_query_result

  client_0:
    build:
      context: .
      dockerfile: src/client/Dockerfile
    command: ["sh", "-c", "sleep 10 && python -m src.client.main"]
    container_name: client_0
    depends_on:
    - gateway
    volumes:
    - ./data/small_trans.csv:/data/small_trans.csv
    - ./data/small_accounts.csv:/data/small_accounts.csv
    - ./results/clients/client_0:/results/clients/client_0
    environment:
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - OUTPUT_PATH=/results/clients/client_0/
    - ACCOUNTS_PATH=/data/small_accounts.csv
    - TRANSACTIONS_PATH=/data/small_trans.csv
    - BATCH_SIZE=500