services:
  rabbitmq:
    build:
      context: .
      dockerfile: src/rabbitmq/Dockerfile
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672

  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq
    - TRANSACTIONS_QUEUE=transactions_queue
    - INPUT_QUEUE=result_queue
    - SERVER_PORT=5678

  # Filtro USD: solo transacciones en dolares
  filter_usd_0:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filter_usd_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/q3_usd_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  # Filtro fecha: rutea 1/9-5/9 (x3 shards) y 6/9-15/9 (sin shard)
  filter_date_0:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filter_date_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/date_multiplex_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  # Group: agrupa por (banco, cuenta, formato_pago) y rutea a aggregators
  group_q3_0:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_q3_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q3_shard_0_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  group_q3_1:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_q3_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q3_shard_1_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  group_q3_2:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_q3_2
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/q3_shard_2_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  # Aggregators: acumulan totales por formato_pago y calculan promedio
  agg_q3_0:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: agg_q3_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/q3_shard_0_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  agg_q3_1:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: agg_q3_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/q3_shard_1_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  agg_q3_2:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: agg_q3_2
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/q3_shard_2_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  # Join: unifica los promedios de los 3 aggregators
  join_q3_0:
    build:
      context: .
      dockerfile: src/join/Dockerfile
    container_name: join_q3_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/join/config/q3_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  # Filtro promedio historico: filtra transacciones 6/9-15/9 con monto < 1% del promedio
  filter_hist_avg_q3_0:
    build:
      context: .
      dockerfile: src/filter/Dockerfile
    container_name: filter_hist_avg_q3_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/filter/config/q3_historical_avg_config.yaml:/app/config.yaml:ro
    environment:
    - PYTHONUNBUFFERED=1
    - MOM_HOST=rabbitmq

  client_0:
    build:
      context: .
      dockerfile: src/client/Dockerfile
    container_name: client_0
    depends_on:
    - gateway
    volumes:
    - ./data/LI-Small_Trans.csv:/data/dataset.csv:ro
    environment:
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - DATASET_PATH=/data/dataset.csv
    - BATCH_SIZE=500
