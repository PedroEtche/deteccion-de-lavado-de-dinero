mom_host: rabbitmq

inputs:
  - type: queue
    name: aggregator_count_pairs_queue

outputs:
  - type: queue
    name: q4_filtered_count

output_message_type: batch

log_level: DEBUG

strategy:
  type: field_greater_than
  params:
    threshold: 5
    field_name: count
    output_queue: q4_filtered_count  # Kept here so your parser doesn't throw a KeyError!