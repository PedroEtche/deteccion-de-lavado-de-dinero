        condition: service_healthy
    volumes:
    - ./src/aggregator/config/account_pairs_aggregator.yaml:/app/config.yaml:ro
    - ./persisted_state:/app/state
    environment:
    - EOF_EXPECTED=2
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=1
    - STAGE_NAME=aggregator_account_pair

  group_by_accounts_0:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_by_accounts_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/group_by_accounts.yaml:/app/config.yaml:ro
    - ./persisted_state:/app/state
    environment:
    - EOF_EXPECTED=1
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=2
    - ROUTING_STRATEGY=sharded
    - STAGE_NAME=group_accounts

  aggregator_accounts_0:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: aggregator_accounts_0 
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/q4_aggregator_accounts.yaml:/app/config.yaml:ro
    - ./persisted_state:/app/state
    environment:
    - EOF_EXPECTED=1
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=1
    - STAGE_NAME=aggregator_accounts

  aggregator_accounts_1:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: aggregator_accounts_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/aggregator/config/q4_aggregator_accounts.yaml:/app/config.yaml:ro
