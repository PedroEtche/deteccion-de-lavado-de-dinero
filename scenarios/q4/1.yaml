    environment:
    - EOF_EXPECTED=3
    - WORKER_ID=2
    - NUM_DOWNSTREAM_WORKERS=2
    - ROUTING_STRATEGY=sharded
    - STAGE_NAME=scatter_aggregator

  merge_with_self_0:
    build:
      context: .
      dockerfile: src/merge/Dockerfile
    container_name: merge_with_self_0 
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/merge/config/selfmerge.yaml:/app/config.yaml:ro
    - ./persisted_state:/app/state
    environment:
    - EOF_EXPECTED=2
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=2
    - STAGE_NAME=self_merge

  merge_with_self_1:
    build:
      context: .
      dockerfile: src/merge/Dockerfile
    container_name: merge_with_self_1 
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/merge/config/selfmerge.yaml:/app/config.yaml:ro
    - ./persisted_state:/app/state
    environment:
    - EOF_EXPECTED=2
    - WORKER_ID=2
    - NUM_DOWNSTREAM_WORKERS=2
    - STAGE_NAME=self_merge

  group_account_pair_0:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_account_pair_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/account_pair_count.yaml:/app/config.yaml:ro
    - ./persisted_state:/app/state
    environment:
    - EOF_EXPECTED=2
    - WORKER_ID=1
    - NUM_DOWNSTREAM_WORKERS=1
    - STAGE_NAME=group_account_pair

  group_account_pair_1:
    build:
      context: .
      dockerfile: src/group/Dockerfile
    container_name: group_account_pair_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
    - ./src/group/config/account_pair_count.yaml:/app/config.yaml:ro
    - ./persisted_state:/app/state
    environment:
    - EOF_EXPECTED=2
    - WORKER_ID=2
    - NUM_DOWNSTREAM_WORKERS=1
    - STAGE_NAME=group_account_pair
    
  aggreator_account_pair_0:
    build:
      context: .
      dockerfile: src/aggregator/Dockerfile
    container_name: aggregator_account_pair_0 
    depends_on:
